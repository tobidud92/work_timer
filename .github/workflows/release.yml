name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create GitHub releases and upload assets

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
        shell: pwsh

      - name: Run tests
        run: python -m pytest -q
        shell: pwsh

      - name: Install PyInstaller
        run: python -m pip install pyinstaller
        shell: pwsh

      - name: Build executables (onedir)
        run: |
          # Produces dist/work_timer/ containing:
          #   work_timer.exe        - full interactive app
          #   work_timer_quick.exe  - slim Kommen/Gehen (fast, windowless)
          #   _internal/            - shared DLLs and .pyd files
          pyinstaller install/work_timer.spec --distpath dist --workpath build --clean -y
        shell: pwsh

      - name: Verify build outputs
        run: |
          if (-not (Test-Path dist\work_timer\work_timer.exe))       { Write-Error 'work_timer.exe missing';       exit 1 }
          if (-not (Test-Path dist\work_timer\work_timer_quick.exe)) { Write-Error 'work_timer_quick.exe missing'; exit 1 }
          Write-Host "Build OK:"
          Get-ChildItem dist\work_timer\*.exe | Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB)}}
        shell: pwsh

      - name: Generate installer folder
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\install\generate_install_folder.ps1 -OutDir WorkTimerInstall_release -Force
        shell: pwsh

      - name: Compress installer folder
        run: |
          # Preserves WorkTimerInstall_release\work_timer\ structure inside the ZIP.
          # User extracts ZIP and runs install.bat from the root.
          Compress-Archive -Path 'WorkTimerInstall_release\*' -DestinationPath 'WorkTimerInstall_release.zip' -Force
        shell: pwsh

      - name: "Optional: Sign executables (requires secrets.PFX_BASE64 and secrets.PFX_PASSWORD)"
        if: env.PFX_BASE64 != '' && env.PFX_PASSWORD != ''
        env:
          PFX_BASE64: ${{ secrets.PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.PFX_PASSWORD }}
        run: |
          Write-Host 'Decoding PFX and signing executables'
          $pfxPath = "agent_temp_cert.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:PFX_BASE64))
          # Signs both work_timer.exe and work_timer_quick.exe
          $files = Get-ChildItem -Path WorkTimerInstall_release -Filter *.exe -File -Recurse
          foreach ($f in $files) {
              Write-Host "Signing $($f.FullName)"
              signtool sign /f $pfxPath /p $env:PFX_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $f.FullName
          }
          Remove-Item $pfxPath -Force
        shell: pwsh

      - name: Create GitHub release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: WorkTimerInstall_release.zip
