name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
        shell: pwsh

      - name: Run tests
        run: python -m pytest -q
        shell: pwsh

      - name: Install PyInstaller
        run: python -m pip install pyinstaller
        shell: pwsh

      - name: Build executables (onedir)
        run: |
          # Produces dist/work_timer/ containing:
          #   work_timer.exe        - full interactive app
          #   work_timer_quick.exe  - slim Kommen/Gehen (fast, windowless)
          #   _internal/            - shared DLLs and .pyd files
          pyinstaller install/work_timer.spec --distpath dist --workpath build --clean -y
        shell: pwsh

      - name: Verify build outputs
        run: |
          if (-not (Test-Path dist\work_timer\work_timer.exe))       { Write-Error 'work_timer.exe missing';       exit 1 }
          if (-not (Test-Path dist\work_timer\work_timer_quick.exe)) { Write-Error 'work_timer_quick.exe missing'; exit 1 }
          Write-Host "Build OK:"
          Get-ChildItem dist\work_timer\*.exe | Select-Object Name, @{N='KB';E={[math]::Round($_.Length/1KB)}}
        shell: pwsh

      - name: Smoke test - prompt_toolkit loads in built exe
        run: |
          # This step catches PyInstaller exclusion bugs (like excluding 'email' which
          # importlib.metadata needs) that would silently break the interactive date picker.
          $result = & dist\work_timer\work_timer.exe --check-prompt-toolkit 2>&1
          Write-Host $result
          if ($LASTEXITCODE -ne 0) {
            Write-Error "prompt_toolkit failed to load in the built exe. Check _EXCLUDES in work_timer.spec."
            exit 1
          }
        shell: pwsh

      - name: Generate installer folder
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\install\generate_install_folder.ps1 -OutDir WorkTimerInstall -Force
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorkTimerInstall
          path: WorkTimerInstall/
