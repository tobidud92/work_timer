name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest reportlab prompt_toolkit
        shell: pwsh

      - name: Run tests
        run: python -m pytest -q
        shell: pwsh

      - name: Generate installer folder
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\\install\\generate_install_folder.ps1 -OutDir WorkTimerInstall -Force
        shell: pwsh

      - name: Compress installer folder
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -Command "Compress-Archive -Path 'WorkTimerInstall\\*' -DestinationPath 'WorkTimerInstall.zip' -Force"
        shell: pwsh

      - name: Upload installer artifact (ZIP only)
        uses: actions/upload-artifact@v4
        with:
          name: WorkTimerInstall
          path: WorkTimerInstall.zip
